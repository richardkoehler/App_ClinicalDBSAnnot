name: CI - Lint and Type Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      - name: Lint
        run: |
          uv run ruff check .

      - name: Format
        run: |
          uv run ruff format --check .

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run pytest --cov-fail-under=48

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      - name: Type check
        run: |
          uv run ty check .

